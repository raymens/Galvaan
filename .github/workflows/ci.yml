name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  build:
    name: Build Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - uses: actions/upload-artifact@v7
        with:
          name: galvaan-linux-x86_64
          path: target/release/galvaan

  package:
    name: Package (DEB + RPM)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v8
        with:
          name: galvaan-linux-x86_64
          path: target/release/
      - run: chmod +x target/release/galvaan

      - name: Install packaging tools
        run: cargo install cargo-deb cargo-generate-rpm

      - name: Build .deb package
        run: cargo deb --no-build

      - name: Build .rpm package
        run: cargo generate-rpm

      - name: Upload .deb
        uses: actions/upload-artifact@v7
        with:
          name: galvaan-linux-x86_64.deb
          path: target/debian/*.deb

      - name: Upload .rpm
        uses: actions/upload-artifact@v7
        with:
          name: galvaan-linux-x86_64.rpm
          path: target/generate-rpm/*.rpm

  integration:
    name: Integration Tests (${{ matrix.distro }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        distro:
          - opensuse_tumbleweed
          - fedora
          - ubuntu
          - archlinux
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v8
        with:
          name: galvaan-linux-x86_64
          path: target/release/
      - run: chmod +x target/release/galvaan
      - run: cargo test --test container_integration "integration_${{ matrix.distro }}" -- --ignored

  format:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [check, test, build, package, integration, format]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: galvaan-linux-x86_64
          path: artifacts/bin/
      - uses: actions/download-artifact@v8
        with:
          name: galvaan-linux-x86_64.deb
          path: artifacts/deb/
      - uses: actions/download-artifact@v8
        with:
          name: galvaan-linux-x86_64.rpm
          path: artifacts/rpm/

      - name: Rename binary
        run: mv artifacts/bin/galvaan artifacts/galvaan-linux-x86_64

      - name: Rename packages
        run: |
          mv artifacts/deb/*.deb artifacts/galvaan-linux-x86_64.deb
          mv artifacts/rpm/*.rpm artifacts/galvaan-linux-x86_64.rpm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/galvaan-linux-x86_64
            artifacts/galvaan-linux-x86_64.deb
            artifacts/galvaan-linux-x86_64.rpm
